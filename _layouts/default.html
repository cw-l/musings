<!DOCTYPE html>

<html>

{% include head.html %}

<link rel="stylesheet" href="/assets/vendor/glightbox/glightbox.min.css">

<body>

  {% include navbar.html %}

  {{ content }}

  {% include footer.html %}

  {% include scripts.html %}

  <script src="/assets/vendor/glightbox/glightbox.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.querySelectorAll("article p").forEach(function(p) {
        const img = p.querySelector("img");
        if (img && img.parentElement.tagName.toLowerCase() !== "a") {
          const a = document.createElement("a");
          a.href = img.src;
          a.className = "glightbox";
          p.replaceChild(a, img);
          a.appendChild(img);
        }
      });
      GLightbox({ selector: 'a.glightbox' });
    });
  </script>
  
  {% include google-analytics.html %}

</body>

</html>
